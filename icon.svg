<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070F"/>
      <stop offset="50%" stop-color="#0A0E27"/>
      <stop offset="100%" stop-color="#12162D"/>
    </linearGradient>
    <radialGradient id="aurora1" cx="20%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="85%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora3" cx="50%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#FF10F0" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#FF10F0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#FF10F0"/>
    </linearGradient>
    <filter id="noteGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Base cosmic background amb corners rodons -->
  <rect width="512" height="512" fill="url(#bgGrad)" rx="92"/>

  <!-- Aurora layers -->
  <rect width="512" height="512" fill="url(#aurora1)" rx="92"/>
  <rect width="512" height="512" fill="url(#aurora2)" rx="92"/>
  <rect width="512" height="512" fill="url(#aurora3)" rx="92"/>

  <!-- Pentagrama stylized (5 línies neó cian subtil) -->
  <g stroke="#00F0FF" stroke-width="2.5" opacity="0.22" stroke-linecap="round">
    <line x1="96" y1="200" x2="416" y2="200"/>
    <line x1="96" y1="232" x2="416" y2="232"/>
    <line x1="96" y1="264" x2="416" y2="264"/>
    <line x1="96" y1="296" x2="416" y2="296"/>
    <line x1="96" y1="328" x2="416" y2="328"/>
  </g>

  <!-- Nota: glow halo -->
  <g transform="translate(256 264)">
    <ellipse cx="0" cy="0" rx="52" ry="42" fill="#00F0FF" filter="url(#noteGlow)" opacity="0.55"/>
    <ellipse cx="0" cy="0" rx="42" ry="34" fill="#FF10F0" filter="url(#noteGlow)" opacity="0.4"/>
  </g>

  <!-- Nota: cap + pal (stem) -->
  <g transform="translate(256 264)">
    <!-- Stem (going up, slight tilt) -->
    <rect x="28" y="-140" width="5" height="156" rx="2" fill="url(#noteGrad)"/>
    <!-- Flag / banderí estilitzat -->
    <path d="M 33 -140 C 88 -120, 98 -70, 60 -40 C 88 -70, 74 -112, 33 -100 Z"
          fill="url(#noteGrad)" opacity="0.9"/>
    <!-- Cap ellipse (filled with gradient) -->
    <ellipse cx="0" cy="14" rx="32" ry="22" transform="rotate(-18)"
             fill="url(#noteGrad)"/>
    <!-- Petit highlight interior -->
    <ellipse cx="-8" cy="6" rx="10" ry="6" transform="rotate(-18)"
             fill="#FFFFFF" opacity="0.35"/>
  </g>

  <!-- Partícula / sparkle decoratiu superior dret -->
  <g fill="#FFB800" opacity="0.9">
    <circle cx="400" cy="110" r="3"/>
    <circle cx="380" cy="135" r="2"/>
    <circle cx="420" cy="160" r="2.5"/>
  </g>

  <!-- Sparkle superior esquerra -->
  <g fill="#00FF94" opacity="0.85">
    <circle cx="112" cy="130" r="2.5"/>
    <circle cx="135" cy="110" r="2"/>
  </g>
</svg>
